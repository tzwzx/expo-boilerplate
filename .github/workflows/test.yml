name: Test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Run tests
        run: bun test:unit

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps chromium

      - name: Run e2e tests
        run: bun test:e2e:web
